info:
  name: Ping
  type: http
  seq: 1
http:
  method: GET
  url: '{{baseUrl}}/api/ping'
  auth: none
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
