info:
  name: Update Clinic
  type: http
  seq: 2
http:
  method: PUT
  url: '{{baseUrl}}/api/clinic'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "name": "Shifo Test Clinic",
        "logoUrl": "https://example.com/logo.png",
        "maxDoctors": 5,
        "isActive": true
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
