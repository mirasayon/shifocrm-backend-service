info:
  name: Create Movement
  type: http
  seq: 7
http:
  method: POST
  url: '{{baseUrl}}/api/inventory/movements'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "movementType": "IN",
        "itemId": {{inventoryItemId}},
        "quantity": 5,
        "notes": "Restock"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const id = res.body?.id;
        if (id !== undefined && id !== null && typeof bru.setVar === "function") {
          bru.setVar("movementId", String(id));
        }
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
