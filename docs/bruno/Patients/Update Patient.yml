info:
  name: Update Patient
  type: http
  seq: 4
http:
  method: PATCH
  url: '{{baseUrl}}/api/patients/{{patientId}}'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "notes": "Updated notes",
        "status": "active",
        "doctorId": {{doctorId}}
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
