info:
  name: Update Visit
  type: http
  seq: 3
http:
  method: PATCH
  url: '{{baseUrl}}/api/visits/{{visitId}}'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "status": "COMPLETED_PAID",
        "paidAmount": 500000
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
