info:
    name: Create Visit Service
    type: http
    seq: 2

http:
    method: POST
    url: "{{baseUrl}}/api/visit-services"
    auth: bearer

auth:
    type: bearer
    bearer:
        token: "{{token}}"

body:
    type: json
    json: |
        {
          "visitId": {{visitId}},
          "patientId": {{patientId}},
          "toothId": {{toothId}},
          "serviceName": "Cleaning",
          "price": 100000
        }

