info:
  name: Create Visit Service
  type: http
  seq: 2
http:
  method: POST
  url: '{{baseUrl}}/api/visit-services'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "visitId": {{visitId}},
        "patientId": {{patientId}},
        "toothId": {{toothId}},
        "serviceName": "Cleaning",
        "price": 100000
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const id = res.body?.id;
        if (id !== undefined && id !== null && typeof bru.setVar === "function") {
          bru.setVar("visitServiceId", String(id));
        }
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
