info:
  name: Create Expense
  type: http
  seq: 10
http:
  method: POST
  url: '{{baseUrl}}/api/inventory/expenses'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "description": "Gloves purchase",
        "amount": 120000,
        "category": "supplies"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setEnvVar === "function") bru.setEnvVar(key, String(value));
        };

        const id = res.body?.id;
        setValue("expenseId", id);
        setValue("EXPENSE_ID", id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
