info:
  name: Create Expense
  type: http
  seq: 10
http:
  method: POST
  url: '{{baseUrl}}/api/inventory/expenses'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "description": "Gloves purchase",
        "amount": 120000,
        "category": "supplies"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;
        if (res.body?.id) bru.setVar("expenseId", res.body.id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
