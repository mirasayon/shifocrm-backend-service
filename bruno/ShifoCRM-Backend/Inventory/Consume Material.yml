info:
  name: Consume Material
  type: http
  seq: 2
http:
  method: POST
  url: '{{baseUrl}}/api/inventory/consume'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "itemId": {{inventoryItemId}},
        "visitId": {{visitId}},
        "quantity": 2,
        "note": "Used for patient filling"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setEnvVar === "function") bru.setEnvVar(key, String(value));
        };

        const id = res.body?.id;
        setValue("consumptionId", id);
        setValue("CONSUMPTION_ID", id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
