info:
    name: Create Movement
    type: http
    seq: 7

http:
    method: POST
    url: "{{baseUrl}}/api/inventory/movements"
    auth: bearer

auth:
    type: bearer
    bearer:
        token: "{{token}}"

body:
    type: json
    json: |
        {
          "movementType": "IN",
          "itemId": {{inventoryItemId}},
          "quantity": 5,
          "notes": "Restock"
        }

