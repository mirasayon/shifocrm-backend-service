info:
  name: Create Item
  type: http
  seq: 3
http:
  method: POST
  url: '{{baseUrl}}/api/inventory/items'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "name": "Composite resin",
        "description": "A2 shade",
        "quantity": 10,
        "unitPrice": 25000
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const id = res.body?.id;
        if (id !== undefined && id !== null && typeof bru.setVar === "function") {
          bru.setVar("inventoryItemId", String(id));
        }
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
