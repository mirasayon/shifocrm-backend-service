info:
  name: Update Item
  type: http
  seq: 4
http:
  method: PATCH
  url: '{{baseUrl}}/api/inventory/items/{{inventoryItemId}}'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "quantity": 20,
        "description": "Updated description"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
