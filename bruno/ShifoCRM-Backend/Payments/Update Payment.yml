info:
  name: Update Payment
  type: http
  seq: 3
http:
  method: PATCH
  url: '{{baseUrl}}/api/payments/{{paymentId}}'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "amount": 60000,
        "note": "Updated payment amount"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
