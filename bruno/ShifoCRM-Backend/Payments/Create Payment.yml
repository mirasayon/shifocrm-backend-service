info:
  name: Create Payment
  type: http
  seq: 2
http:
  method: POST
  url: '{{baseUrl}}/api/payments'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "visitId": {{visitId}},
        "amount": 50000,
        "method": "cash",
        "note": "Payment for visit",
        "paymentType": "payment",
        "paidAt": "2026-03-17T12:00:00Z"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setEnvVar === "function") bru.setEnvVar(key, String(value));
        };

        const id = res.body?.id;
        setValue("paymentId", id);
        setValue("PAYMENT_ID", id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
