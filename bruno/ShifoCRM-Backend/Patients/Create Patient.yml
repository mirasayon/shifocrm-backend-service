info:
  name: Create Patient
  type: http
  seq: 2
http:
  method: POST
  url: '{{baseUrl}}/api/patients'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "fullName": "Eshmat Toshmatov",
        "phone": "+998901234567",
        "birthDate": "1990-01-01",
        "gender": "male",
        "address": "Tashkent, Uzbekistan",
        "doctorId": {{doctorId}},
        "status": "active",
        "notes": "First time visit",
        "createFirstVisit": true
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setEnvVar === "function") bru.setEnvVar(key, String(value));
        };

        const id = res.body?.id;
        setValue("patientId", id);
        setValue("PATIENT_ID", id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
