info:
  name: Update My Profile
  type: http
  seq: 3
http:
  method: PATCH
  url: '{{baseUrl}}/api/doctors/me'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "fullName": "Updated Name",
        "phone": "+998901234567",
        "email": "updated@example.com",
        "specialization": "Dentist",
        "workSchedule": {
          "mon": ["09:00-18:00"],
          "tue": ["09:00-18:00"]
        }
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
