info:
  name: Create Doctor
  type: http
  seq: 5
http:
  method: POST
  url: '{{baseUrl}}/api/doctors'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "fullName": "Dr. Jane Doe",
        "phone": "+998901111111",
        "email": "doctor@example.com",
        "password": "password123",
        "specialization": "Dentist",
        "isActive": true,
        "workSchedule": {
          "wed": ["10:00-16:00"]
        }
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;
        if (res.body?.id) bru.setVar("doctorId", res.body.id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
