info:
    name: Change My Password
    type: http
    seq: 4

http:
    method: PATCH
    url: "{{baseUrl}}/api/doctors/me/password"
    auth: bearer

auth:
    type: bearer
    bearer:
        token: "{{token}}"

body:
    type: json
    json: |
        {
          "currentPassword": "{{adminPassword}}",
          "newPassword": "newStrongPassword123"
        }

