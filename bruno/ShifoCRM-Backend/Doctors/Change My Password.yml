info:
  name: Change My Password
  type: http
  seq: 4
http:
  method: PATCH
  url: '{{baseUrl}}/api/doctors/me/password'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "currentPassword": "{{adminPassword}}",
        "newPassword": "newStrongPassword123"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
runtime:
  scripts:
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
