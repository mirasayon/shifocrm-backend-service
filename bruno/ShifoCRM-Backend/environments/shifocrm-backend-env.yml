name: shifocrm-backend-env
variables:
  - name: baseUrl
    value: "{{process.env.BASE_URL}}"
  - name: adminEmail
    value: "{{process.env.USER_EMAIL}}"
  - name: adminPassword
    value: "{{process.env.USER_PASSWORD}}"
  - name: token
    value: "{{process.env.SESSION_TOKEN}}"
  - name: clinicId
    value: "{{process.env.CLINIC_ID}}"
  - name: doctorId
    value: "{{process.env.DOCTOR_ID}}"
  - name: patientId
    value: "{{process.env.PATIENT_ID}}"
  - name: visitId
    value: "{{process.env.VISIT_ID}}"
  - name: paymentId
    value: "{{process.env.PAYMENT_ID}}"
  - name: inventoryItemId
    value: "{{process.env.INVENTORY_ITEM_ID}}"
  - name: movementId
    value: "{{process.env.MOVEMENT_ID}}"
  - name: expenseId
    value: "{{process.env.EXPENSE_ID}}"
  - name: consumptionId
    value: "{{process.env.CONSUMPTION_ID}}"
  - name: visitServiceId
    value: "{{process.env.VISIT_SERVICE_ID}}"
  - name: odontogramId
    value: "{{process.env.ODONTOGRAM_ID}}"
  - name: toothId
    value: "{{process.env.TOOTH_ID}}"
