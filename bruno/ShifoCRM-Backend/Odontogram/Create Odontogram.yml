info:
  name: Create Odontogram
  type: http
  seq: 4
http:
  method: POST
  url: '{{baseUrl}}/api/odontogram'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "patientId": {{patientId}},
        "visitId": {{visitId}},
        "data": {
          "teeth": {}
        }
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const id = res.body?.id;
        if (id !== undefined && id !== null && typeof bru.setVar === "function") {
          bru.setVar("odontogramId", String(id));
        }
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
