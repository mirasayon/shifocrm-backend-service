info:
  name: Get Or Create Odontogram
  type: http
  seq: 5
http:
  method: POST
  url: '{{baseUrl}}/api/odontogram/get-or-create'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "patientId": {{patientId}},
        "visitId": {{visitId}}
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 200) return;

        const id = res.body?.id;
        if (id !== undefined && id !== null && typeof bru.setVar === "function") {
          bru.setVar("odontogramId", String(id));
        }
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
