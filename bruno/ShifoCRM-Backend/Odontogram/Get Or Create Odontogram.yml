info:
    name: Get Or Create Odontogram
    type: http
    seq: 5

http:
    method: POST
    url: "{{baseUrl}}/api/odontogram/get-or-create"
    auth: bearer

auth:
    type: bearer
    bearer:
        token: "{{token}}"

body:
    type: json
    json: |
        {
          "patientId": {{patientId}},
          "visitId": {{visitId}}
        }

