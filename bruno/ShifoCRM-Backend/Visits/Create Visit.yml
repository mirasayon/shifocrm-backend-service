info:
  name: Create Visit
  type: http
  seq: 2
http:
  method: POST
  url: '{{baseUrl}}/api/visits'
  auth:
    type: bearer
    token: '{{token}}'
  body:
    type: json
    data: |
      {
        "patientId": {{patientId}},
        "doctorId": {{doctorId}},
        "notes": "Tooth extraction setup",
        "price": 500000,
        "paidAmount": 250000
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 201) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setEnvVar === "function") bru.setEnvVar(key, String(value));
        };

        const id = res.body?.id;
        setValue("visitId", id);
        setValue("VISIT_ID", id);
    - type: tests
      code: |-
        test("status should be 201", function () {
          expect(res.status).to.equal(201);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
