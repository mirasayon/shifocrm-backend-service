info:
  name: Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{baseUrl}}/api/auth/login'
  body:
    type: json
    data: |-
      {
        "identifier": "{{adminEmail}}",
        "password": "{{adminPassword}}"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 200) return;

        const setValue = (key, value) => {
          if (value === undefined || value === null || value === "") return;
          if (typeof bru.setVar === "function") bru.setVar(key, String(value));
        };

        const token = res.body?.access_token ?? res.body?.accessToken;
        setValue("token", token);

        const clinicId = res.body?.user?.clinicId;
        setValue("clinicId", clinicId);

        const doctorId = res.body?.user?.id;
        setValue("doctorId", doctorId);
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
