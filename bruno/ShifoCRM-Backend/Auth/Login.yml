info:
  name: Login
  type: http
  seq: 1
http:
  method: POST
  url: '{{baseUrl}}/api/auth/login'
  body:
    type: json
    data: |-
      {
        "identifier": "{{adminEmail}}",
        "password": "{{adminPassword}}"
      }
runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status !== 200) return;

        const token = res.body?.access_token ?? res.body?.accessToken;
        if (token) bru.setVar("token", token);

        const clinicId = res.body?.user?.clinicId;
        if (clinicId !== undefined) bru.setVar("clinicId", clinicId);

        const userId = res.body?.user?.id;
        if (userId) bru.setVar("doctorId", userId);
    - type: tests
      code: |-
        test("status should be 200", function () {
          expect(res.status).to.equal(200);
        });
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
