info:
    name: Login
    type: http
    seq: 1

http:
    method: POST
    url: "{{baseUrl}}/api/auth/login"
    body:
        type: json
        data: |-
            {
              "identifier": "{{adminEmail}}",
              "password": "{{adminPassword}}"
            }

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5
